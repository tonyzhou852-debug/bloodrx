<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — VANDL VHS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#111827;--ink-3:#6b7280;--border:#e5e7eb;--surface:#fff;--bg:#f7f8f9;--brand:#b91c1c;--brand-bg:#fff1f1;--brand-bd:#fecaca;--radius:10px;--radius-lg:14px;--shadow:0 4px 24px rgba(0,0,0,.08)}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{width:100%;max-width:400px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:36px 32px;text-align:center}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:24px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:18px;font-weight:700;color:var(--ink)}
.logo-text em{color:var(--brand);font-style:normal}
h2{font-size:20px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--ink-3);margin-bottom:24px}
.form-group{margin-bottom:16px;text-align:left}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
input[type=password]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.btn{width:100%;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.btn:hover{background:#991b1b}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error-msg{background:var(--brand-bg);border:1px solid var(--brand-bd);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--brand);margin-bottom:16px;display:none;text-align:left}
.error-msg.show{display:block}
.success-msg{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#065f46;margin-bottom:16px;display:none}
.success-msg.show{display:block}
.back-link{display:inline-block;margin-top:16px;font-size:13px;color:var(--ink-3);text-decoration:none}
.back-link:hover{color:var(--brand)}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L8 9H3l4.5 5.5L5 22l7-4.5L19 22l-2.5-7.5L21 9h-5L12 2z"/></svg></div>
    <span class="logo-text">VANDL<em>VHS</em></span>
  </a>
  <h2 id="title">Set a new password</h2>
  <p class="sub" id="sub">Choose a strong password of at least 8 characters.</p>
  <div class="error-msg" id="err"></div>
  <div class="success-msg" id="ok"></div>
  <div id="form-area">
    <div class="form-group">
      <label for="pw">New Password</label>
      <input type="password" id="pw" placeholder="Min. 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <div class="form-group">
      <label for="pw2">Confirm Password</label>
      <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn" id="btn" onclick="doReset()">Reset Password</button>
  </div>
  <a href="/login" class="back-link">← Back to sign in</a>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('title').textContent = 'Invalid link';
  document.getElementById('sub').textContent = 'This reset link is missing or invalid. Please request a new one.';
  document.getElementById('form-area').style.display = 'none';
}

async function doReset() {
  document.getElementById('err').classList.remove('show');
  document.getElementById('ok').classList.remove('show');
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw.length < 8) return showErr('Password must be at least 8 characters.');
  if (pw !== pw2) return showErr('Passwords do not match.');
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Resetting…';
  try {
    const resp = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw }),
    });
    const data = await resp.json();
    if (!resp.ok) return showErr(data.error || 'Reset failed.');
    document.getElementById('form-area').style.display = 'none';
    const ok = document.getElementById('ok');
    ok.textContent = 'Password reset successfully! Redirecting to sign in…';
    ok.classList.add('show');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch(e) {
    showErr('Network error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
}
</script>
</body>
</html>
