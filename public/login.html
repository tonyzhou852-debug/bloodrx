<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — VANDL Health Score</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111827;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --border:#e5e7eb;--surface:#fff;--bg:#f7f8f9;
  --brand:#b91c1c;--brand-bg:#fff1f1;--brand-bd:#fecaca;
  --green:#059669;--radius:10px;--radius-lg:14px;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

.card{width:100%;max-width:420px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}

.card-header{padding:32px 32px 0;text-align:center}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:18px;font-weight:700;color:var(--ink)}
.logo-text em{color:var(--brand);font-style:normal}
.card-title{font-size:20px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--ink-3);margin-bottom:24px}

.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 32px}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:500;color:var(--ink-3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.tab:hover:not(.active){color:var(--ink-2)}

.card-body{padding:24px 32px 32px}

.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:var(--ink-2);margin-bottom:6px}
input[type=text],input[type=email],input[type=password]{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-family:inherit;color:var(--ink);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
input::placeholder{color:var(--ink-4)}

.btn-primary{
  width:100%;padding:12px;background:var(--brand);color:#fff;border:none;
  border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.btn-primary:hover{background:#991b1b}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink-4);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-google{
  width:100%;padding:11px;background:var(--surface);color:var(--ink-2);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;
}
.btn-google:hover{border-color:var(--ink-3);background:var(--bg)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

.error-msg{
  background:var(--brand-bg);border:1px solid var(--brand-bd);
  border-radius:var(--radius);padding:10px 14px;
  font-size:13px;color:var(--brand);margin-bottom:16px;display:none;
}
.error-msg.show{display:block}

.success-msg{
  background:#ecfdf5;border:1px solid #a7f3d0;
  border-radius:var(--radius);padding:10px 14px;
  font-size:13px;color:#065f46;margin-bottom:16px;display:none;
}
.success-msg.show{display:block}

.panel{display:none}
.panel.active{display:block}

.footer-note{text-align:center;font-size:12px;color:var(--ink-4);margin-top:20px}
.footer-note a{color:var(--ink-3)}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:-4px}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.remember-row label{font-size:13px;color:var(--ink-3);cursor:pointer;margin:0;font-weight:400}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <a href="/" class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L8 9H3l4.5 5.5L5 22l7-4.5L19 22l-2.5-7.5L21 9h-5L12 2z"/></svg></div>
      <span class="logo-text">VANDL<em>VHS</em></span>
    </a>
    <div class="card-title" id="card-title">Welcome back</div>
    <div class="card-sub" id="card-sub">Sign in to your VHS account</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showPanel('login')">Sign In</button>
    <button class="tab" onclick="showPanel('register')">Create Account</button>
  </div>

  <div class="card-body">

    <!-- Login panel -->
    <div class="panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me" checked>
        <label for="remember-me">Remember me for 30 days</label>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="divider">or</div>
      <button class="btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Register panel -->
    <div class="panel" id="panel-register">
      <div class="error-msg" id="register-error"></div>
      <div class="success-msg" id="register-success"></div>
      <div class="form-group">
        <label for="reg-username">Full Name / Username</label>
        <input type="text" id="reg-username" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-primary" id="register-btn" onclick="doRegister()">Create Account</button>

      <div class="divider">or</div>
      <button class="btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>
    </div>

  </div>
</div>

<script>
// Check for error param
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'google') {
  document.getElementById('login-error').textContent = 'Google login failed. Please try again.';
  document.getElementById('login-error').classList.add('show');
}

function showPanel(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  document.querySelectorAll('.tab')[panel === 'login' ? 0 : 1].classList.add('active');
  if (panel === 'login') {
    document.getElementById('card-title').textContent = 'Welcome back';
    document.getElementById('card-sub').textContent = 'Sign in to your VHS account';
  } else {
    document.getElementById('card-title').textContent = 'Create account';
    document.getElementById('card-sub').textContent = 'Get started with VANDL Health Score';
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

async function doLogin() {
  hideError('login-error');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('login-error', 'Please enter your email and password.');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, rememberMe: document.getElementById('remember-me').checked }),
      credentials: 'include',
    });
    const data = await resp.json();
    if (!resp.ok) { showError('login-error', data.error || 'Login failed.'); return; }
    window.location.href = '/';
  } catch(e) {
    showError('login-error', 'Network error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister() {
  hideError('register-error');
  document.getElementById('register-success').classList.remove('show');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showError('register-error', 'All fields are required.');
  if (password.length < 8) return showError('register-error', 'Password must be at least 8 characters.');
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
      credentials: 'include',
    });
    const data = await resp.json();
    if (!resp.ok) { showError('register-error', data.error || 'Registration failed.'); return; }
    window.location.href = '/';
  } catch(e) {
    showError('register-error', 'Network error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

function googleLogin() {
  window.location.href = '/auth/google';
}
</script>
</body>
</html>
