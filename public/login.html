<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Vitava Health Score</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111827;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --border:#e5e7eb;--surface:#fff;--bg:#f7f8f9;
  --brand:#b91c1c;--brand-bg:#fff1f1;--brand-bd:#fecaca;
  --green:#059669;--radius:10px;--radius-lg:14px;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

.card{width:100%;max-width:420px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}

.card-header{padding:32px 32px 0;text-align:center}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:18px;font-weight:700;color:var(--ink)}
.logo-text em{color:var(--brand);font-style:normal}
.card-title{font-size:20px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--ink-3);margin-bottom:24px}

.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 32px}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:500;color:var(--ink-3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.tab:hover:not(.active){color:var(--ink-2)}

.card-body{padding:24px 32px 32px}

.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:var(--ink-2);margin-bottom:6px}
input[type=text],input[type=email],input[type=password]{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-family:inherit;color:var(--ink);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
input::placeholder{color:var(--ink-4)}

.btn-primary{
  width:100%;padding:12px;background:var(--brand);color:#fff;border:none;
  border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background .15s;margin-top:4px;
}
.btn-primary:hover{background:#991b1b}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ink-4);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-google{
  width:100%;padding:11px;background:var(--surface);color:var(--ink-2);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;
}
.btn-google:hover{border-color:var(--ink-3);background:var(--bg)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

.error-msg{
  background:var(--brand-bg);border:1px solid var(--brand-bd);
  border-radius:var(--radius);padding:10px 14px;
  font-size:13px;color:var(--brand);margin-bottom:16px;display:none;
}
.error-msg.show{display:block}

.success-msg{
  background:#ecfdf5;border:1px solid #a7f3d0;
  border-radius:var(--radius);padding:10px 14px;
  font-size:13px;color:#065f46;margin-bottom:16px;display:none;
}
.success-msg.show{display:block}

.panel{display:none}
.panel.active{display:block}

.footer-note{text-align:center;font-size:12px;color:var(--ink-4);margin-top:20px}
.footer-note a{color:var(--ink-3)}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:-4px}
.remember-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
.remember-row label{font-size:13px;color:var(--ink-3);cursor:pointer;margin:0;font-weight:400}
.forgot-link{margin-left:auto;background:none;border:none;font-size:12px;color:var(--ink-3);cursor:pointer;font-family:inherit;text-decoration:underline;text-decoration-style:dotted;padding:0;white-space:nowrap}
.forgot-link:hover{color:var(--brand)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px !important}
.pw-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:var(--ink-3);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:color .15s}
.pw-eye:hover{color:var(--ink)}
.pw-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <a href="/" class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L8 9H3l4.5 5.5L5 22l7-4.5L19 22l-2.5-7.5L21 9h-5L12 2z"/></svg></div>
      <span class="logo-text">Vita<em>va</em></span>
    </a>
    <div class="card-title" id="card-title">Welcome back</div>
    <div class="card-sub" id="card-sub">Sign in to your Vitava account</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="showPanel('login')">Sign In</button>
    <button class="tab" id="tab-register" onclick="showPanel('register')">Create Account</button>
  </div>

  <div class="card-body">

    <!-- Login panel -->
    <div class="panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label for="login-email" id="label-login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password" id="label-login-password">Password</label>
        <div class="pw-wrap"><input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"><button type="button" class="pw-eye" onclick="togglePw('login-password', this)" aria-label="Show password" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me" checked>
        <label for="remember-me" id="label-remember">Remember me for 30 days</label>
        <button type="button" class="forgot-link" id="forgot-link" onclick="showPanel('forgot')">Forgot password?</button>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="divider" id="divider-login">or</div>
      <button class="btn-google" id="google-login-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="google-login-text">Continue with Google</span>
      </button>
    </div>

    <!-- Forgot password panel -->
    <div class="panel" id="panel-forgot">
      <div class="error-msg" id="forgot-error"></div>
      <div class="success-msg" id="forgot-success"></div>
      <p style="font-size:13px;color:var(--ink-3);margin-bottom:16px" id="forgot-desc">Enter your email address and we'll send you a reset link.</p>
      <div class="form-group">
        <label for="forgot-email" id="label-forgot-email">Email</label>
        <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')doForgot()">
      </div>
      <button class="btn-primary" id="forgot-btn" onclick="doForgot()">Send Reset Link</button>
      <div style="text-align:center;margin-top:14px">
        <button type="button" class="forgot-link" onclick="showPanel('login')" id="back-to-login">← Back to sign in</button>
      </div>
    </div>

    <!-- Register panel -->
    <div class="panel" id="panel-register">
      <div class="error-msg" id="register-error"></div>
      <div class="success-msg" id="register-success"></div>
      <div class="form-group">
        <label for="reg-username" id="label-reg-username">Full Name / Username</label>
        <input type="text" id="reg-username" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email" id="label-reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password" id="label-reg-password">Password</label>
        <div class="pw-wrap"><input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"><button type="button" class="pw-eye" onclick="togglePw('reg-password', this)" aria-label="Show password" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
      </div>
      <button class="btn-primary" id="register-btn" onclick="doRegister()">Create Account</button>

      <div class="divider" id="divider-register">or</div>
      <button class="btn-google" id="google-register-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="google-register-text">Sign up with Google</span>
      </button>
    </div>

  </div>
</div>

    forgotPassword:'\u5fd8\u8bb0\u5bc6\u7801\uff1f',
    forgotTitle:'\u91cd\u7f6e\u5bc6\u7801', forgotSub:'\u8f93\u5165\u60a8\u7684\u90ae\u7bb1\u4ee5\u63a5\u6536\u91cd\u7f6e\u94fe\u63a5\u3002',

    signIn:'\u767b\u5165', signUp:'\u5efa\u7acb\u5e33\u6236',
    email:'\u96fb\u5b50\u90f5\u4ef6', password:'\u5bc6\u78bc', rememberMe:'30\u5929\u5167\u8a18\u4f4f\u6211',
    or:'\u6216', continueGoogle:'\u4f7f\u7528Google\u7e7c\u7e8c', signUpGoogle:'\u4f7f\u7528Google\u8a3b\u518a',
    fullNameUsername:'\u59d3\u540d / \u7528\u6236\u540d',
    enterCreds:'\u8acb\u8f38\u5165\u60a8\u7684\u96fb\u5b50\u90f5\u4ef6\u548c\u5bc6\u78bc\u3002',
    signingIn:'\u6b63\u5728\u767b\u5165...',
    allFieldsRequired:'\u6240\u6709\u6b04\u4f4d\u90fd\u662f\u5fc5\u586b\u7684\u3002',

    creatingAccount:'\u6b63\u5728\u5efa\u7acb\u5e33\u6236...',
    networkError:'\u7db2\u8def\u932f\u8aa4\uff0c\u8acb\u91cd\u8a66\u3002',
    googleFailed:'Google\u767b\u5165\u5931\u6557\uff0c\u8acb\u91cd\u8a66\u3002',
    loginFailed:'\u767b\u5165\u5931\u6557\u3002',
    registerFailed:'\u8a3b\u518a\u5931\u6557\u3002',
    forgotPassword:'\u5fd8\u8a18\u5bc6\u78bc\uff1f',
    forgotTitle:'\u91cd\u7f6e\u5bc6\u78bc', forgotSub:'\u8f38\u5165\u60a8\u7684\u96fb\u5b50\u90f5\u4ef6\u4ee5\u63a5\u6536\u91cd\u7f6e\u9023\u7d50\u3002',
    forgotDesc:'\u8f38\u5165\u60a8\u7684\u96fb\u5b50\u90f5\u4ef6\u5730\u5740\uff0c\u6211\u5011\u5c07\u767c\u9001\u91cd\u7f6e\u9023\u7d50\u3002',
    sendReset:'\u767c\u9001\u91cd\u7f6e\u9023\u7d50', backToLogin:'\u2190 \u8fd4\u56de\u767b\u5165',
    resetSent:'\u8acb\u6aa2\u67e5\u60a8\u7684\u96fb\u5b50\u90f5\u4ef6\u2014\u2014\u5982\u679c\u8a72\u5730\u5740\u5df2\u8a3b\u518a\uff0c\u91cd\u7f6e\u9023\u7d50\u5c07\u5df2\u767c\u9001\u3002',
    resetFailed:'\u767c\u9001\u91cd\u7f6e\u90f5\u4ef6\u5931\u6557\uff0c\u8acb\u91cd\u8a66\u3002',
  },
};
let LOGIN_LANG = 'en';
let LT = LOGIN_I18N.en;

function applyLoginI18n() {
  const setText = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  setText('card-title', LT.welcomeBack);
  setText('card-sub', LT.signInSub);
  setText('tab-login', LT.signIn);
  setText('tab-register', LT.signUp);
  setText('label-login-email', LT.email);
  setText('label-login-password', LT.password);
  setText('label-remember', LT.rememberMe);
  setText('login-btn', LT.signIn);
  setText('divider-login', LT.or);
  setText('google-login-text', LT.continueGoogle);
  setText('label-reg-username', LT.fullNameUsername);
  setText('label-reg-email', LT.email);
  setText('label-reg-password', LT.password);
  setText('register-btn', LT.signUp);
  setText('divider-register', LT.or);
  setText('google-register-text', LT.signUpGoogle);
  setText('forgot-link', LT.forgotPassword);
  setText('forgot-desc', LT.forgotDesc);
  setText('forgot-btn', LT.sendReset);
  setText('back-to-login', LT.backToLogin);
  setText('label-forgot-email', LT.email);
  document.documentElement.lang = LOGIN_LANG === 'zh-CN' ? 'zh-Hans' : LOGIN_LANG === 'zh-TW' ? 'zh-Hant' : 'en';
}

async function detectLoginLang() {
  try {
    const res = await fetch('/api/lang');
    const data = await res.json();
    LOGIN_LANG = data.lang || 'en';
  } catch(e) { LOGIN_LANG = 'en'; }
  LT = LOGIN_I18N[LOGIN_LANG] || LOGIN_I18N.en;
  applyLoginI18n();

  // Apply error param translation after language is known
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('error') === 'google') {
    document.getElementById('login-error').textContent = LT.googleFailed;
    document.getElementById('login-error').classList.add('show');
  }
}

function showPanel(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
  if (panel === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('card-title').textContent = LT.welcomeBack;
    document.getElementById('card-sub').textContent = LT.signInSub;
  } else if (panel === 'register') {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('card-title').textContent = LT.createAccount;
    document.getElementById('card-sub').textContent = LT.createSub;
  } else if (panel === 'forgot') {
    document.getElementById('card-title').textContent = LT.forgotTitle;
    document.getElementById('card-sub').textContent = LT.forgotSub;
    document.getElementById('forgot-success').classList.remove('show');
    document.getElementById('forgot-error').classList.remove('show');
    document.getElementById('forgot-email').value = '';
  }
}

async function doForgot() {
  hideError('forgot-error');
  document.getElementById('forgot-success').classList.remove('show');
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return showError('forgot-error', LT.enterCreds || 'Please enter your email.');
  const btn = document.getElementById('forgot-btn');
  const originalText = btn.textContent;
  btn.disabled = true; btn.textContent = '…';

  // Show a patience message after 5s (free tier cold start)
  const slowTimer = setTimeout(() => {
    if (btn.disabled) btn.textContent = 'Sending… (this may take up to 30s)';
  }, 5000);

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 35000);

  try {
    const resp = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    clearTimeout(slowTimer);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed.');
    const s = document.getElementById('forgot-success');
    s.textContent = LT.resetSent || 'Check your email — a reset link has been sent if that address is registered.';
    s.classList.add('show');
  } catch(e) {
    clearTimeout(timeout);
    clearTimeout(slowTimer);
    const msg = e.name === 'AbortError'
      ? 'Server is taking too long. Please wait a moment and try again.'
      : (e.message || LT.resetFailed || 'Failed to send reset email. Please try again.');
    showError('forgot-error', msg);
  } finally {
    btn.disabled = false;
    btn.textContent = LT.sendReset || originalText || 'Send Reset Link';
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}
function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

async function doLogin() {
  hideError('login-error');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('login-error', LT.enterCreds);
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = LT.signingIn;
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, rememberMe: document.getElementById('remember-me').checked }),
      credentials: 'include',
    });
    const data = await resp.json();
    if (!resp.ok) { showError('login-error', data.error || LT.loginFailed); return; }
    window.location.href = '/';
  } catch(e) {
    showError('login-error', LT.networkError);
  } finally {
    btn.disabled = false; btn.textContent = LT.signIn;
  }
}

async function doRegister() {
  hideError('register-error');
  document.getElementById('register-success').classList.remove('show');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showError('register-error', LT.allFieldsRequired);
  if (password.length < 8) return showError('register-error', LT.pwTooShort);
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = LT.creatingAccount;
  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
      credentials: 'include',
    });
    const data = await resp.json();
    if (!resp.ok) { showError('register-error', data.error || LT.registerFailed); return; }
    window.location.href = '/';
  } catch(e) {
    showError('register-error', LT.networkError);
  } finally {
    btn.disabled = false; btn.textContent = LT.signUp;
  }
}

function googleLogin() {
  window.location.href = '/auth/google';
}

function togglePw(inputId, btn) {
  var inp = document.getElementById(inputId);
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  btn.innerHTML = show
    ? '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  inp.focus();
}
