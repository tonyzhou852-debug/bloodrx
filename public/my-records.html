<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Records — VANDL VHS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111827;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --border:#e5e7eb;--surface:#fff;--bg:#f7f8f9;--bg-2:#f3f4f6;
  --brand:#b91c1c;--brand-bg:#fff1f1;--brand-bd:#fecaca;
  --green:#059669;--green-bg:#ecfdf5;--green-bd:#a7f3d0;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --radius-sm:6px;--radius:10px;--radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.6;color:var(--ink);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
.topbar-inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;height:60px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:15px;font-weight:700;color:var(--ink)}
.logo-text em{color:var(--brand);font-style:normal}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.user-badge{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:var(--ink-2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{padding:5px 12px;background:none;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;color:var(--ink-3);cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--brand);color:var(--brand)}
.lang-switcher{display:flex;gap:3px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
.lang-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;border:none;background:none;color:var(--ink-3);cursor:pointer;transition:all .15s;font-family:inherit}
.lang-btn.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow-sm)}
.lang-btn:hover:not(.active){color:var(--ink)}

/* Toggle switcher (history <-> upload) */
.view-toggle{display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
.view-toggle a{
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;
  text-decoration:none;cursor:pointer;transition:all .15s;color:var(--ink-3);
  display:flex;align-items:center;gap:6px;
}
.view-toggle a.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow-sm)}
.view-toggle a:hover:not(.active){color:var(--ink)}
.view-toggle svg{width:14px;height:14px;flex-shrink:0}

.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
.page-header{margin-bottom:1.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.page-header p{font-size:13px;color:var(--ink-3)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow-sm)}
.stat-label{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-.03em;color:var(--ink);line-height:1}
.stat-card.brand .stat-value{color:var(--brand)}

.records-list{display:flex;flex-direction:column;gap:12px}
.record-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:1.1rem 1.4rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:border-color .15s,box-shadow .15s;
}
.record-card:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(185,28,28,.08)}
.record-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.record-name{font-size:15px;font-weight:700;color:var(--ink)}
.record-meta{font-size:12px;color:var(--ink-3);margin-top:2px}
.vhs-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.vhs-excellent{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.vhs-good{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.vhs-fair{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.vhs-attention,.vhs-poor{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.record-score-row{display:flex;align-items:center;gap:10px;flex-shrink:0}
.record-score{font-size:22px;font-weight:700}
.record-summary{font-size:13px;color:var(--ink-2);line-height:1.6;margin-top:6px}
.record-date{font-size:11px;color:var(--ink-4);margin-top:8px}
.record-del-btn{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  background:none;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:11px;font-weight:500;font-family:inherit;color:var(--ink-3);cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.record-del-btn:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

.empty-state{text-align:center;padding:4rem 2rem;color:var(--ink-3)}
.empty-state svg{margin-bottom:14px;opacity:.4}
.empty-state h3{font-size:16px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.empty-cta{
  display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 20px;
  background:var(--brand);color:#fff;border-radius:var(--radius);text-decoration:none;
  font-size:14px;font-weight:600;
}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:0 24px 64px rgba(0,0,0,.2);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:16px;font-weight:700;color:var(--ink)}
.modal-sub{font-size:12px;color:var(--ink-3);margin-top:3px}
.modal-close{width:32px;height:32px;border-radius:6px;background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:16px;flex-shrink:0;transition:all .15s}
.modal-close:hover{border-color:var(--brand);color:var(--brand)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.detail-row{display:flex;gap:8px;margin-bottom:10px;font-size:13px}
.detail-row strong{color:var(--ink-2);min-width:120px;flex-shrink:0}
.detail-row span{color:var(--ink-3)}
.risk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.risk-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.risk-card-label{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.risk-card-val{font-size:13px;font-weight:600;color:var(--ink)}
.btn-cancel{padding:9px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-danger{padding:9px 18px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}

@media(max-width:600px){
  .topbar-right .user-name{display:none}
  .page{padding:1.5rem 1rem 3rem}
  .record-card-head{flex-direction:column}
}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <a href="/" class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L8 9H3l4.5 5.5L5 22l7-4.5L19 22l-2.5-7.5L21 9h-5L12 2z"/></svg></div>
      <span class="logo-text">VANDL<em>VHS</em></span>
    </a>
    <div class="view-toggle" id="view-toggle">
      <a href="/" id="toggle-upload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span id="toggle-upload-text">New Assessment</span>
      </a>
      <a href="/my-records" class="active" id="toggle-history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>
        <span id="toggle-history-text">My History</span>
      </a>
    </div>
    <div class="topbar-right">
      <div class="lang-switcher">
        <button class="lang-btn" id="ls-en" onclick="switchLang('en')">EN</button>
        <button class="lang-btn" id="ls-zh-CN" onclick="switchLang('zh-CN')">简</button>
        <button class="lang-btn" id="ls-zh-TW" onclick="switchLang('zh-TW')">繁</button>
      </div>
      <div class="user-badge" id="user-badge" style="display:none">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<main class="page">
  <div class="page-header">
    <div>
      <h1 id="page-title">My Health Records</h1>
      <p id="page-sub">All wellness assessments you have submitted</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card brand"><div class="stat-label" id="stat-total-label">Total Assessments</div><div class="stat-value" id="st-total">—</div></div>
    <div class="stat-card"><div class="stat-label" id="stat-latest-label">Latest VHS Score</div><div class="stat-value" id="st-latest">—</div></div>
    <div class="stat-card"><div class="stat-label" id="stat-avg-label">Average VHS Score</div><div class="stat-value" id="st-avg">—</div></div>
  </div>

  <div class="records-list" id="records-list">
    <div class="empty-state"><div class="spinner"></div><p id="loading-text">Loading your records…</p></div>
  </div>
</main>

<!-- Detail modal -->
<div class="modal-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="detail-title">Assessment Details</div>
        <div class="modal-sub" id="detail-sub"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-danger" id="detail-del-btn" onclick="deleteCurrentRecord()">Delete This Record</button>
      <button class="btn-cancel" id="detail-close-btn" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<script>
/* ── i18n ─────────────────────────────────────────────────────── */
const T = {
  en: {
    title:'My Health Records', sub:'All wellness assessments you have submitted',
    statTotal:'Total Assessments', statLatest:'Latest VHS Score', statAvg:'Average VHS Score',
    newAssessment:'New Assessment', myHistory:'My History', signOut:'Sign Out',
    loading:'Loading your records…', loadError:'Failed to load your records. Please refresh.',
    emptyTitle:'No assessments yet', emptyBody:'Submit your first health document to see results here.',
    emptyCta:'Start an Assessment',
    detailTitle:'Assessment Details', close:'Close', deleteRecord:'Delete This Record',
    deleteConfirm:'Delete this record permanently? This cannot be undone.',
    deleteFailed:'Failed to delete: ', needsAttention:'Needs Attention',
    excellent:'Excellent', good:'Good', fair:'Fair', poor:'Poor',
    age:'Age', gender:'Gender', phone:'Phone', complaint:'Complaint', notes:'Notes',
    keyConcerns:'Key Concerns', monitoring:'Monitoring Plan',
    riskCV:'Cardiovascular', riskMet:'Metabolic', riskLiver:'Liver', riskKidney:'Kidney', riskInflam:'Inflammation',
    notProvided:'Not provided',
  },
  'zh-CN': {
    title:'我的健康记录', sub:'您提交的所有健康评估记录',
    statTotal:'评估总数', statLatest:'最新VHS评分', statAvg:'平均VHS评分',
    newAssessment:'新建评估', myHistory:'我的记录', signOut:'退出登录',
    loading:'正在加载您的记录…', loadError:'加载记录失败，请刷新页面。',
    emptyTitle:'暂无评估记录', emptyBody:'提交您的第一份健康文档即可在此查看结果。',
    emptyCta:'开始评估',
    detailTitle:'评估详情', close:'关闭', deleteRecord:'删除此记录',
    deleteConfirm:'确定要永久删除此记录吗？此操作无法撤销。',
    deleteFailed:'删除失败：', needsAttention:'需要关注',
    excellent:'优秀', good:'良好', fair:'一般', poor:'较差',
    age:'年龄', gender:'性别', phone:'电话', complaint:'主诉', notes:'备注',
    keyConcerns:'主要健康问题', monitoring:'监测计划',
    riskCV:'心血管', riskMet:'代谢', riskLiver:'肝脏', riskKidney:'肾脏', riskInflam:'炎症',
    notProvided:'未提供',
  },
  'zh-TW': {
    title:'我的健康記錄', sub:'您提交的所有健康評估記錄',
    statTotal:'評估總數', statLatest:'最新VHS評分', statAvg:'平均VHS評分',
    newAssessment:'新建評估', myHistory:'我的記錄', signOut:'退出登入',
    loading:'正在載入您的記錄…', loadError:'載入記錄失敗，請重新整理頁面。',
    emptyTitle:'暫無評估記錄', emptyBody:'提交您的第一份健康文件即可在此查看結果。',
    emptyCta:'開始評估',
    detailTitle:'評估詳情', close:'關閉', deleteRecord:'刪除此記錄',
    deleteConfirm:'確定要永久刪除此記錄嗎？此操作無法復原。',
    deleteFailed:'刪除失敗：', needsAttention:'需要關注',
    excellent:'優秀', good:'良好', fair:'一般', poor:'較差',
    age:'年齡', gender:'性別', phone:'電話', complaint:'主訴', notes:'備註',
    keyConcerns:'主要健康問題', monitoring:'監測計劃',
    riskCV:'心血管', riskMet:'代謝', riskLiver:'肝臟', riskKidney:'腎臟', riskInflam:'發炎',
    notProvided:'未提供',
  },
};
let LANG = 'en';
let L = T.en;

function applyI18n() {
  document.getElementById('page-title').textContent = L.title;
  document.getElementById('page-sub').textContent = L.sub;
  document.getElementById('stat-total-label').textContent = L.statTotal;
  document.getElementById('stat-latest-label').textContent = L.statLatest;
  document.getElementById('stat-avg-label').textContent = L.statAvg;
  document.getElementById('toggle-upload-text').textContent = L.newAssessment;
  document.getElementById('toggle-history-text').textContent = L.myHistory;
  document.getElementById('logout-btn').textContent = L.signOut;
  document.getElementById('loading-text').textContent = L.loading;
  document.getElementById('detail-title').textContent = L.detailTitle;
  document.getElementById('detail-close-btn').textContent = L.close;
  document.getElementById('detail-del-btn').textContent = L.deleteRecord;
  document.documentElement.lang = LANG === 'zh-CN' ? 'zh-Hans' : LANG === 'zh-TW' ? 'zh-Hant' : 'en';
  // highlight active lang button
  ['en','zh-CN','zh-TW'].forEach(l => {
    const btn = document.getElementById('ls-' + l);
    if (btn) btn.classList.toggle('active', l === LANG);
  });
}

function switchLang(lang) {
  LANG = lang;
  L = T[LANG] || T.en;
  localStorage.setItem('vhs_lang', lang);
  applyI18n();
  renderStats();
  renderList();
}

async function detectLang() {
  const saved = localStorage.getItem('vhs_lang');
  if (saved && T[saved]) {
    LANG = saved;
  } else {
    try {
      const res = await fetch('/api/lang');
      const data = await res.json();
      LANG = data.lang || 'en';
    } catch(e) { LANG = 'en'; }
  }
  L = T[LANG] || T.en;
  applyI18n();
}

/* ── Data ─────────────────────────────────────────────────────── */
let myRecords = [];
let _currentDetailId = null;

function vhsClass(score) {
  if (score >= 90) return 'vhs-excellent';
  if (score >= 75) return 'vhs-good';
  if (score >= 60) return 'vhs-fair';
  if (score >= 40) return 'vhs-attention';
  return 'vhs-poor';
}
function vhsLabel(score) {
  if (score >= 90) return L.excellent;
  if (score >= 75) return L.good;
  if (score >= 60) return L.fair;
  if (score >= 40) return L.needsAttention;
  if (score > 0) return L.poor;
  return '—';
}
function scoreColor(s) {
  if (s >= 90) return '#059669';
  if (s >= 75) return '#2563eb';
  if (s >= 60) return '#b45309';
  return '#dc2626';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadRecords() {
  try {
    const res = await fetch('/api/my/records', { credentials: 'include' });
    if (res.status === 401) { window.location.href = '/login'; return; }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    myRecords = await res.json();
    renderStats();
    renderList();
  } catch(e) {
    document.getElementById('records-list').innerHTML =
      '<div class="empty-state"><p style="color:var(--brand)">' + esc(L.loadError) + '</p></div>';
  }
}

function renderStats() {
  const total = myRecords.length;
  const scores = myRecords.filter(r => r.vhs_score > 0).map(r => r.vhs_score);
  const latest = scores.length ? scores[0] : 0; // sorted desc by id already
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-latest').textContent = latest || '—';
  document.getElementById('st-avg').textContent = avg || '—';
}

function renderList() {
  const list = document.getElementById('records-list');
  if (myRecords.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <h3>${esc(L.emptyTitle)}</h3>
        <p>${esc(L.emptyBody)}</p>
        <a href="/" class="empty-cta">${esc(L.emptyCta)}</a>
      </div>`;
    return;
  }
  list.innerHTML = myRecords.map(r => `
    <div class="record-card" data-id="${r.id}">
      <div class="record-card-head">
        <div>
          <div class="record-name">${esc(r.name||'—')}</div>
          <div class="record-meta">${[r.age && r.age+'y', r.gender].filter(Boolean).map(esc).join(' · ')}</div>
        </div>
        <div class="record-score-row">
          <div class="record-score" style="color:${scoreColor(r.vhs_score)}">${r.vhs_score||'—'}</div>
          <span class="vhs-badge ${vhsClass(r.vhs_score)}">${vhsLabel(r.vhs_score)}</span>
        </div>
      </div>
      ${r.summary ? `<div class="record-summary">${esc(r.summary)}</div>` : ''}
      <div class="record-date">${new Date(r.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>
  `).join('');

  list.querySelectorAll('.record-card').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.dataset.id)));
  });
}

function riskRow(label, score) {
  if (!score) return '';
  const names = ['','Very Low','Low','Moderate','High','Very High'];
  const idx = LANG==='zh-CN' ? ['','极低','低','中等','高','极高']
            : LANG==='zh-TW' ? ['','極低','低','中等','高','極高']
            : names;
  const color = ['','#059669','#65a30d','#b45309','#dc2626','#7f1d1d'][score]||'var(--ink-3)';
  return `<div class="risk-card"><div class="risk-card-label">${label}</div><div class="risk-card-val" style="color:${color}">${idx[score]} (${score}/5)</div></div>`;
}

function openDetail(id) {
  const r = myRecords.find(x => x.id === id);
  if (!r) return;
  _currentDetailId = id;
  document.getElementById('detail-sub').textContent =
    new Date(r.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

  const risks = [
    riskRow(L.riskCV, r.risk_cardiovascular),
    riskRow(L.riskMet, r.risk_metabolic),
    riskRow(L.riskLiver, r.risk_liver),
    riskRow(L.riskKidney, r.risk_kidney),
    riskRow(L.riskInflam, r.risk_inflammation),
  ].filter(Boolean).join('');

  document.getElementById('detail-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <div style="font-size:36px;font-weight:700;color:${scoreColor(r.vhs_score)}">${r.vhs_score||'—'}</div>
      <div>
        <div style="font-weight:700;font-size:16px">${esc(r.name||'')}</div>
        <span class="vhs-badge ${vhsClass(r.vhs_score)}">${vhsLabel(r.vhs_score)}</span>
      </div>
    </div>
    <div class="detail-row"><strong>${L.age}</strong><span>${esc(r.age)||L.notProvided}</span></div>
    <div class="detail-row"><strong>${L.gender}</strong><span>${esc(r.gender)||L.notProvided}</span></div>
    <div class="detail-row"><strong>${L.phone}</strong><span>${esc(r.phone)||L.notProvided}</span></div>
    ${r.complaint ? `<div class="detail-row"><strong>${L.complaint}</strong><span>${esc(r.complaint)}</span></div>` : ''}
    ${r.notes ? `<div class="detail-row"><strong>${L.notes}</strong><span>${esc(r.notes)}</span></div>` : ''}
    ${r.summary ? `<p style="margin-top:14px;font-size:14px;line-height:1.7;color:var(--ink-2)">${esc(r.summary)}</p>` : ''}
    ${r.key_health_concerns ? `<div class="detail-row" style="margin-top:14px"><strong>${L.keyConcerns}</strong><span>${esc(r.key_health_concerns)}</span></div>` : ''}
    ${risks ? `<div class="risk-grid">${risks}</div>` : ''}
    ${r.monitoring_plan ? `<div style="margin-top:16px;padding:12px 14px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);font-size:13px;color:var(--ink-2)"><strong>${L.monitoring}:</strong> ${esc(r.monitoring_plan)}</div>` : ''}
  `;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); _currentDetailId = null; }

async function deleteCurrentRecord() {
  if (_currentDetailId === null) return;
  if (!confirm(L.deleteConfirm)) return;
  try {
    const res = await fetch('/api/my/records/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ id: _currentDetailId })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Delete failed');
    myRecords = myRecords.filter(r => r.id !== _currentDetailId);
    closeDetail();
    renderStats();
    renderList();
  } catch(e) {
    alert(L.deleteFailed + e.message);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

/* ── Auth ─────────────────────────────────────────────────────── */
async function loadUser() {
  try {
    const resp = await fetch('/api/auth/me', { credentials: 'include' });
    if (!resp.ok) { window.location.href = '/login'; return; }
    const data = await resp.json();
    const u = data.user;
    document.getElementById('user-name').textContent = u.username || u.email;
    document.getElementById('user-avatar').textContent = (u.username || u.email || '?')[0].toUpperCase();
    document.getElementById('user-badge').style.display = 'flex';
  } catch(e) {
    window.location.href = '/login';
  }
}
async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/login';
}

(async function init() {
  await detectLang();
  await loadUser();
  await loadRecords();
})();
</script>
</body>
